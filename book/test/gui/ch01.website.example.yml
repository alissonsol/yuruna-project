# yaml-language-server: $schema=../../../../../yuruna/test/schemas/sequence.schema.yml

# Copyright (c) 2019-2026 by Alisson Sol et al.
# Interaction sequence for driving VM workload testing.
# See possible actions in the actions.yml file.
# ${vmName}, ${hostType}, ${guestKey} are built-in. ${ext:area.Method(args)}
# invokes the active extension under test/extension/<area>/.

# Perf-log identity (see https://yuruna.link/test/perf). Bump revision on step add/remove.
sequenceGuid: 42001283-d9e8-4f12-a78e-5c5f2206926c
sequenceRevision: 1

description: "Amazon Linux 2023 used for simple access to a website"

baseline:
  amazon.linux.2023:
    - start.guest.amazon.linux.2023
variables:
  username: ch01user1

steps:
  - action: retry
    maxAttempts: 2
    description: "Login (restart on timeout)"
    steps:
      - action: passwdPrompt
        pattern: "login:"
        timeoutSeconds: 600
        text: "${username}"
        description: "${vmName} login:"

      - action: passwdPrompt
        pattern: "Password:"
        text: "${ext:authentication.GetPassword(${username})}"
        description: "Password:"

  - action: waitForText
    pattern: "${username}@${vmName}"
    timeoutSeconds: 90
    description: "${username}@${vmName}"

  - action: fetchAndExecute
    text: "curl -so /dev/null -w '\\nReturn code: %{http_code}\\n\\n' example.com"
    description: "Check example.com"
    waitPattern: "200"

  - action: break
    id: amazon.linux.2023.website
    description: "Breakpoint"

  - action: inputTextAndEnter
    text: "sudo shutdown now"
    description: "Shutdown the VM"

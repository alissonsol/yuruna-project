sequenceGuid: 42001283-d9e8-4f13-a78e-5c5f2206926e
sequenceRevision: 1

description: "Amazon Linux 2023 used for simple access to a website"
keystrokeMechanism: gui

resource:
  amazon.linux.2023:
    - start.guest.amazon.linux.2023
variables:
  username: ch01user1
  hostname: ch01host1

component:
  - action: retry
    maxAttempts: 2
    description: "Login + retry"
    steps:
      - snippet: firstLoginPrime

      - action: passwdPrompt
        pattern: "login:"
        timeoutSeconds: 600
        text: "${username}"
        description: "OCR: login:"

      - action: passwdPrompt
        pattern: "Password:"
        text: "${ext:authentication.GetPassword(${username})}"
        description: "OCR: Password:"

  - action: waitForText
    pattern: "${username}@${hostname}"
    timeoutSeconds: 90
    description: "OCR: ${username}@${hostname}"

workload:
  - action: fetchAndExecute
    text: "curl -so /dev/null -w '\\nReturn code: %{http_code}\\n\\n' example.com"
    description: "curl example.com"
    waitPattern: "200"

  - action: networkRelease
    description: "Release network resources"

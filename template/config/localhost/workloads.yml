# Workloads information - localhost
#
# Minimal generic scaffold: it creates the namespace and the registry
# image-pull secret, then leaves a TO-SET placeholder for your own
# component deployment. For a full localhost pipeline with TLS (mkcert),
# an nginx ingress, and a cert-manager issuer, copy and adapt
# example/website/config/localhost/workloads.yml -- it pins the
# cert-manager version through a single ${env:certManagerLatest} variable
# instead of hardcoding one here.
---
globalVariables:
  # Registry pull credentials. _registryLocation strips the .azurecr.io
  # suffix so the same value works for a localhost registry and ACR.
  _registryLocation:     "$($([Environment]::GetEnvironmentVariable(\"${env:registryName}.registryLocation\")) -replace '.azurecr.io','')"
  dockerServer:          "http://${env:_registryLocation}"
  dockerUsername:        "placeholder"
  dockerPassword:        "placeholder"

workloads:
- context: "${env:runTag}-${env:project}-${env:runId}"
  deployments:
    # Idempotent cleanup + namespace setup.
    - kubectl: "delete namespace ${env:namespace} --ignore-not-found=true --v=1"
    - kubectl: "create namespace ${env:namespace} --v=1"
    - kubectl: "config set-context --current --namespace=${env:namespace} --v=1"
    # Image-pull secret so the cluster can pull from your registry.
    - kubectl: "create secret docker-registry registry-credential --docker-server=${env:dockerServer} --docker-username=${env:dockerUsername} --docker-password=${env:dockerPassword}"
    # TO-SET: deploy your component(s). A Helm chart under workloads/, e.g.:
    #   - chart: "frontend/yourcomponent"
    #     variables:
    #       installName: "yourcomponent-${env:runId}"
    # or a raw manifest / command:
    #   - kubectl: "apply -f workloads/yourcomponent/manifest.yml"
    - shell: 'Write-Information ">> TO-SET: add your component deployment in config/localhost/workloads.yml"'
    - shell: 'Write-Information "-- Check pods:     kubectl get pods --all-namespaces"'
    - shell: 'Write-Information "-- Check services: kubectl get svc --all-namespaces"'

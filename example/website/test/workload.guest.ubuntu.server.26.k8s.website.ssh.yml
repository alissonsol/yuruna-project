# SSH variant of workload.guest.ubuntu.server.26.k8s.website (keystrokeMechanism: ssh).
# See possible actions in the actions.yml file.

# Perf-log identity (see https://yuruna.link/test/perf). Bump revision on step add/remove.
sequenceGuid: 42272942-dcd0-48fc-ba88-814462c89f5a
sequenceRevision: 1

description: "Ubuntu Server (SSH): install Kubernetes, deploy website to localhost cluster, verify HTTP 200."
keystrokeMechanism: ssh
resource:
  ubuntu.server.26:
    - workload.guest.ubuntu.server.26.ssh
variables:
  username: yuuser26
  hostname: yuhost26

# component -- wait for sshd, smoke-test the session.
component:
  - action: sshWaitReady
    timeoutSeconds: 300
    description: "Wait for sshd + authorized_keys"

  - action: sshExec
    command: "whoami && hostname"
    description: "Smoke test: whoami/hostname"

# workload -- install Kubernetes, deploy the website, verify HTTP 200.
workload:
  - action: sshFetchAndExecute
    command: "/usr/local/lib/yuruna/fetch-and-execute.sh guest/ubuntu.server.26/ubuntu.server.26.k8s.sh"
    timeoutSeconds: 1800
    description: "ubuntu.server.26.k8s.sh"

  - action: sshExec
    command: "kubectl get nodes | grep -w Ready"
    timeoutSeconds: 120
    description: "Verify at least one node Ready"

  - action: sshFetchAndExecute
    command: "/usr/local/lib/yuruna/fetch-and-execute.sh project/example/website/test/ubuntu.server.26/ubuntu.server.26.workload.k8s.website.sh"
    timeoutSeconds: 1800
    description: "ubuntu.server.26.workload.k8s.website.sh"

  - action: sshExec
    command: "bash /home/${username}/yuruna/test/test-localhost.sh 2>&1 | tee /tmp/test-localhost.out; grep -q 200 /tmp/test-localhost.out"
    timeoutSeconds: 120
    description: "Check HTTP 200 in test output"

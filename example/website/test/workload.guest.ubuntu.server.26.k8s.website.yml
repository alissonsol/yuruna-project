sequenceGuid: 423775c5-e5e9-4ab5-b07b-b38a91bb9fda
sequenceRevision: 1

description: "Ubuntu Server: log in, install Kubernetes, deploy website to localhost cluster, verify HTTP 200."
keystrokeMechanism: gui
resource:
  ubuntu.server.26:
    - workload.guest.ubuntu.server.26
variables:
  username: yuuser26
  hostname: yuhost26

component:
  - action: retry
    maxAttempts: 2
    description: "Login + retry"
    steps:
      - action: passwdPrompt
        pattern: "login:"
        timeoutSeconds: 600
        text: "${username}"
        description: "OCR: login:"

      - action: passwdPrompt
        pattern: "Password:"
        text: "${ext:authentication.GetPassword(${username})}"
        description: "OCR: Password:"

  - action: waitForText
    pattern: "${username}@${hostname}"
    timeoutSeconds: 90
    description: "OCR: ${username}@${hostname}"

workload:
  - action: fetchAndExecute
    text: "/usr/local/lib/yuruna/fetch-and-execute.sh guest/ubuntu.server.26/ubuntu.server.26.k8s.sh"
    description: "ubuntu.server.26.k8s.sh"
    waitPattern: "FETCHED AND EXECUTED:"
    timeoutSeconds: 1800

  - action: inputTextAndEnter
    text: "kubectl wait --for=condition=Ready nodes --all --timeout=300s; clear; kubectl get nodes"
    description: "Check node status"

  - action: waitForText
    pattern: "Ready"
    timeoutSeconds: 90
    description: "OCR: Ready"

  - action: inputTextAndEnter
    text: "clear; newgrp docker"
    description: "Activate docker group"

  - action: fetchAndExecute
    text: "/usr/local/lib/yuruna/fetch-and-execute.sh project/example/website/test/ubuntu.server.26/ubuntu.server.26.workload.k8s.website.sh"
    description: "ubuntu.server.26.workload.k8s.website.sh"
    waitPattern: "FETCHED AND EXECUTED:"
    timeoutSeconds: 900

  # --- REGION: https://yuruna.link/kubernetes#why-the-website-readiness-check-waits-on-deployment-availability-not-endpoints
  - action: fetchAndExecute
    text: "kubectl wait --for=condition=available deployment/website -n website --timeout=240s; kubectl wait --for=condition=available deployment/nginx-ingress-ingress-nginx-controller -n ingress-ns --timeout=240s; clear; /usr/local/lib/yuruna/fetch-and-execute.sh test/test-localhost.sh"
    description: "test-localhost.sh"
    waitPattern: "200 OK"

  - action: saveSystemDiagnostic
    id: k8s.website
    description: "Capture diagnostics"

  - action: networkRelease
    description: "Release network resources"

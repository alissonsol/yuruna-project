# yaml-language-server: $schema=../../../../../yuruna/test/schemas/sequence.schema.yml

# Interaction sequence for driving VM workload testing.
# See possible actions in the actions.yml file.
# ${vmName}, ${hostType}, ${guestKey} are built-in. ${ext:area.Method(args)}
# invokes the active extension under test/extension/<area>/.

description: "Ubuntu Server: log in, install Kubernetes, deploy website to localhost cluster, verify HTTP 200."
baseline:
  ubuntu.server:
    - workload.guest.ubuntu.server
variables:
  username: yuuser1

steps:
  - action: passwdPrompt
    pattern: "login:"
    timeoutSeconds: 600
    text: "${username}"
    description: "${vmName} login:"

  - action: passwdPrompt
    pattern: "Password:"
    timeoutSeconds: 90
    text: "${ext:authentication.GetPassword(${username})}"
    description: "Password"

  - action: waitForText
    pattern: "${username}@${vmName}"
    timeoutSeconds: 90
    description: "${username}@${vmName}"

  - action: fetchAndExecute
    text: "/automation/fetch-and-execute.sh guest/ubuntu.server/ubuntu.server.k8s.sh"
    description: "ubuntu.server.k8s.sh"
    waitPattern: "FETCHED AND EXECUTED:"
    timeoutSeconds: 1800

  - action: inputTextAndEnter
    text: "kubectl wait --for=condition=Ready nodes --all --timeout=300s; clear; kubectl get nodes"
    description: "Check node status"

  - action: waitForText
    pattern: "Ready"
    timeoutSeconds: 90
    description: "Ready"

  - action: inputTextAndEnter
    text: "clear; newgrp docker"
    description: "Activate docker group"

  - action: fetchAndExecute
    text: "/automation/fetch-and-execute.sh project/example/website/test/ubuntu.server/ubuntu.server.workload.k8s.website.sh"
    description: "ubuntu.server.workload.k8s.website.sh"
    waitPattern: "FETCHED AND EXECUTED:"
    timeoutSeconds: 900

  - action: fetchAndExecute
    text: "kubectl wait --for=jsonpath='{.subsets[0].addresses[0].ip}' endpoints/website-service -n website --timeout=240s; kubectl wait --for=jsonpath='{.subsets[0].addresses[0].ip}' endpoints/nginx-ingress-ingress-nginx-controller -n ingress-ns --timeout=240s; clear; /automation/fetch-and-execute.sh test/test-localhost.sh"
    description: "test-localhost.sh"
    waitPattern: "200 OK"

  - action: saveSystemDiagnostic
    id: k8s.website
    description: "Capture diagnostics"

  - action: inputTextAndEnter
    text: "clear; exit;"
    description: "Exit back to login"

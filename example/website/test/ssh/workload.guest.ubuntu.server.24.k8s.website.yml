# SSH-driven equivalent of gui/workload.guest.ubuntu.server.24.k8s.website.yml.
# Selected automatically when test.config.yml has vmCommunication.keystrokeMechanism='SSH'.
# See possible actions in the actions.yml file.

# Perf-log identity (see https://yuruna.link/test/perf). Bump revision on step add/remove.
sequenceGuid: 42001283-d9e8-4f11-a78e-5c5f2206926c
sequenceRevision: 1

description: "Ubuntu Server: install Kubernetes, deploy website to localhost cluster, verify HTTP 200 - parallel path to the keystroke sequence."
baseline:
  ubuntu.server.24:
    - workload.guest.ubuntu.server.24
variables:
  username: yuuser24

steps:
  - action: sshWaitReady
    timeoutSeconds: 300
    description: "Wait for sshd + authorized_keys"

  - action: sshExec
    command: "whoami && hostname"
    description: "Smoke test: whoami/hostname"

  - action: sshFetchAndExecute
    command: "/usr/local/lib/yuruna/fetch-and-execute.sh guest/ubuntu.server.24/ubuntu.server.24.k8s.sh"
    timeoutSeconds: 1800
    description: "ubuntu.server.24.k8s.sh"

  - action: sshExec
    command: "kubectl get nodes | grep -w Ready"
    timeoutSeconds: 120
    description: "Verify at least one node Ready"

  - action: sshFetchAndExecute
    command: "/usr/local/lib/yuruna/fetch-and-execute.sh project/example/website/test/ubuntu.server.24/ubuntu.server.24.workload.k8s.website.sh"
    timeoutSeconds: 1800
    description: "ubuntu.server.24.workload.k8s.website.sh"

  - action: sshExec
    command: "bash /home/${username}/yuruna/test/test-localhost.sh 2>&1 | tee /tmp/test-localhost.out; grep -q 200 /tmp/test-localhost.out"
    timeoutSeconds: 120
    description: "Check HTTP 200 in test output"

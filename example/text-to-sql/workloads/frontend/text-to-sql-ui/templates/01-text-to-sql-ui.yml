apiVersion: apps/v1
kind: Deployment
metadata:
  name: text-to-sql-ui
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: text-to-sql-ui
  template:
    metadata:
      labels:
        app: text-to-sql-ui
    spec:
      containers:
      - name: text-to-sql-ui
        {{- $regKey := printf "%s.registryLocation" (required "Helm values is missing 'registryName'. Check that resources.yml globalVariables sets registryName and that yuruna resources / components / workloads all ran in the same project_root." .Values.registryName) }}
        {{- $reg := required (printf "Helm values is missing key %q. The registry's tofu output did not reach values.yaml. Check that config/<env>/resources.output.yml has a %s block with a registryLocation.value (run 'yuruna resources <project> <env>' to (re)create it) before running 'yuruna workloads'." $regKey .Values.registryName) (index .Values $regKey) }}
        image: {{ $reg }}/{{ required "Helm values is missing 'containerPrefix'." .Values.containerPrefix }}/text-to-sql-ui:latest
        imagePullPolicy: Always
        ports:
        - name: port80
          containerPort: 80
        - name: port443
          containerPort: 443
        resources:
          requests:
            ephemeral-storage: "256Mi"
            memory: "128Mi"
            cpu: "200m"
          limits:
            ephemeral-storage: "1Gi"
            memory: "128Mi"
            cpu: "200m"
        env:
        - name: ASPNETCORE_URLS
          value: "https://+;http://+"
        - name: ASPNETCORE_HTTPS_PORT
          value: "443"
        - name: ASPNETCORE_Kestrel__Certificates__Default__Password
          value: "password"
        - name: ASPNETCORE_Kestrel__Certificates__Default__Path
          value: "/app/aspnetapp.pfx"
        readinessProbe:
          httpGet:
            path: /
            port: 443
            scheme: HTTPS
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 12
      imagePullSecrets:
        - name: registry-credential
---
apiVersion: v1
kind: Service
metadata:
  name: text-to-sql-ui
  namespace: {{ .Values.namespace }}
  labels:
    app: text-to-sql-ui
spec:
  type: NodePort
  ports:
    - name: port80
      port: 80
      targetPort: 80
      protocol: TCP
    - name: port443
      port: 443
      targetPort: 443
      protocol: TCP
  selector:
    app: text-to-sql-ui

# so no operator Continue is required.

sequenceGuid: 42ed7613-c319-4d8f-9391-66001c258b2d
sequenceRevision: 2

description: "Ubuntu Server: restore snapshot, install + set up PostgreSQL, deploy text-to-sql, verify HTTP 200."
keystrokeMechanism: gui
resource:
  ubuntu.server.24:
    - workload.guest.ubuntu.server.24.k8s.text-to-sql.baseline
# See https://yuruna.link/test/requires-snapshot for the contract.
requiresSnapshot:
  id: "k8s.text-to-sql"
variables:
  username: yt2sqluser
  hostname: yt2sqlhost

component:
  - action: loadDiskSnapshot
    id: "k8s.text-to-sql"
    description: "Restore the Kubernetes baseline checkpoint"

  - action: retry
    maxAttempts: 2
    description: "Login + retry"
    steps:
      - snippet: firstLoginPrime

      - action: passwdPrompt
        pattern: "login:"
        timeoutSeconds: 600
        text: "${username}"
        description: "OCR: login:"

      - action: passwdPrompt
        pattern: "Password:"
        text: "${ext:authentication.GetPassword(${username})}"
        description: "OCR: Password:"

  - action: waitForText
    pattern: "${username}@"
    timeoutSeconds: 90
    description: "OCR: ${username}@ (shell prompt)"

workload:
  - action: fetchAndExecute
    text: "/usr/local/lib/yuruna/fetch-and-execute.sh guest/ubuntu.server.24/ubuntu.server.24.postgresql.sh"
    description: "ubuntu.server.24.postgresql.sh (install PostgreSQL 18)"
    waitPattern: "FETCHED AND EXECUTED:"
    timeoutSeconds: 900

  - action: fetchAndExecute
    text: "/usr/local/lib/yuruna/fetch-and-execute.sh project/example/text-to-sql/test/ubuntu.server.24/ubuntu.server.24.workload.k8s.text-to-sql.db.sh"
    description: "text-to-sql DB bring-up (ssl off, create yuruna_demo, load schema, open pg_hba)"
    waitPattern: "FETCHED AND EXECUTED:"
    timeoutSeconds: 600

  - action: fetchAndExecute
    text: "/usr/local/lib/yuruna/fetch-and-execute.sh project/example/text-to-sql/test/ubuntu.server.24/ubuntu.server.24.workload.k8s.text-to-sql.sh"
    description: "ubuntu.server.24.workload.k8s.text-to-sql.sh (build image, deploy pod + ingress)"
    waitPattern: "FETCHED AND EXECUTED:"
    timeoutSeconds: 900

  - action: fetchAndExecute
    text: "kubectl wait --for=condition=available deployment/text-to-sql-ui -n text-to-sql --timeout=240s; kubectl wait --for=condition=available deployment/nginx-ingress-ingress-nginx-controller -n ingress-ns --timeout=240s; clear; /usr/local/lib/yuruna/fetch-and-execute.sh test/test-localhost.sh"
    description: "wait for deployments, then test-localhost.sh (expect HTTP 200)"
    waitPattern: "200 OK"
    timeoutSeconds: 900

  - action: saveSystemDiagnostic
    id: k8s.text-to-sql
    description: "Capture diagnostics after the deploy comes up"
